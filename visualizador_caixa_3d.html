<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bom de Cheiro &amp; Bom de Boca — Visualizador 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#1a110c; }
  #app { position:relative; width:100vw; height:100vh; }
  canvas { display:block; touch-action:none; }

  .title {
    position:absolute; top:env(safe-area-inset-top,16px); left:0; right:0;
    text-align:center; color:#e7c578; z-index:10; pointer-events:none;
    padding-top:14px;
  }
  .title h1 { font-family:Georgia,serif; font-size:clamp(15px,4.2vw,22px); font-weight:bold; letter-spacing:.5px; }
  .title p  { font-size:clamp(10px,2.6vw,13px); color:#b89a6a; margin-top:3px; font-style:italic; }

  .controls {
    position:absolute; left:0; right:0; bottom:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom,0px));
    background:linear-gradient(to top, rgba(20,12,8,.92), rgba(20,12,8,0));
  }
  .btn-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  button {
    appearance:none; border:1px solid #6f5526; cursor:pointer;
    background:rgba(45,30,20,.85); color:#e7c578;
    font-size:clamp(12px,3.4vw,14px); font-weight:600;
    padding:12px 18px; border-radius:10px; transition:all .2s;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; gap:7px;
  }
  button:hover { background:rgba(70,53,38,.95); transform:translateY(-1px); }
  button:active { transform:translateY(0); }
  button.active { background:#c9a04a; color:#2a1c10; border-color:#c9a04a; }
  .hint { color:#8f7550; font-size:clamp(10px,2.6vw,12px); text-align:center; }

  #loader {
    position:absolute; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:#1a110c; color:#e7c578; flex-direction:column; gap:14px;
  }
  .spin { width:38px; height:38px; border:3px solid #4a3a22; border-top-color:#e7c578; border-radius:50%; animation:s 1s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }

  .panel {
    position:absolute; top:env(safe-area-inset-top,16px); right:12px; z-index:15;
    background:rgba(30,20,13,.92); border:1px solid #6f5526; border-radius:10px;
    padding:10px; width:170px; backdrop-filter:blur(8px); display:none;
  }
  .panel.open { display:block; }
  .panel label { display:block; color:#b89a6a; font-size:10px; margin:6px 0 2px; }
  .panel input[type=file] { width:100%; font-size:9px; color:#8f7550; }
  .gear {
    position:absolute; top:calc(env(safe-area-inset-top,16px) + 4px); right:12px; z-index:16;
    width:34px; height:34px; border-radius:8px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="loader"><div class="spin"></div><div>Montando a caixa 3D…</div></div>

  <div class="title">
    <h1>Bom de Cheiro &amp; Bom de Boca</h1>
    <p>Reserva · Pinot Noir · Bag-in-Box 3L</p>
  </div>

  <button class="gear" id="gearBtn" title="Plugar imagens reais">⚙</button>
  <div class="panel" id="panel">
    <strong style="color:#e7c578;font-size:11px;">Plugar faces reais</strong>
    <label>Frente</label><input type="file" accept="image/*" data-face="front">
    <label>Verso</label><input type="file" accept="image/*" data-face="back">
    <label>Lateral A</label><input type="file" accept="image/*" data-face="left">
    <label>Lateral B</label><input type="file" accept="image/*" data-face="right">
    <label>Topo</label><input type="file" accept="image/*" data-face="top">
  </div>

  <div class="controls">
    <div class="hint">Arraste para girar · pinça para zoom</div>
    <div class="btn-row">
      <button id="explodeBtn">⛶ Desmontar</button>
      <button id="tapBtn">◉ Ver torneira</button>
      <button id="resetBtn">↺ Resetar vista</button>
      <button id="spinBtn" class="active">⟳ Giro auto</button>
    </div>
  </div>
</div>

const GOLD="#c9a04a", GOLD_LT="#f2db9c", GOLD_DK="#a8843f",
      CREAM="#f3ead4", DARK="#2a1c10";

/* ---- gera textura estilizada de cada face via canvas 2D ---- */
function makeFaceTexture(kind){
  const c=document.createElement('canvas'); const S=512;
  // faces frente/verso são estreitas (100), laterais largas (185)
  const wide = (kind==='left'||kind==='right');
  c.width = wide?512:300; c.height=512;
  const x=c.getContext('2d'); const W=c.width,H=c.height;

  function pattern(col){ // padrão geométrico dourado simplificado
    x.fillStyle=col; const g=46;
    for(let yy=20; yy<H-20; yy+=g){
      for(let xx=20; xx<W-20; xx+=g){
        x.beginPath();
        x.moveTo(xx, yy-13); x.lineTo(xx+13,yy); x.lineTo(xx,yy+13); x.lineTo(xx-13,yy);
        x.closePath(); x.fill();
      }
    }
  }
  function logo(cx,cy,sc){
    x.save(); x.translate(cx,cy); x.scale(sc,sc);
    x.fillStyle=GOLD_DK; x.textAlign='center'; x.font='bold 30px Georgia';
    x.fillText('Bom de',0,-44); x.fillText('Cheiro',0,-12);
    x.font='italic 20px Georgia'; x.fillText('&',0,14);
    x.font='bold 30px Georgia'; x.fillText('Bom',0,44); x.font='bold 22px Georgia'; x.fillText('de Boca',0,70);
    x.fillStyle=DARK; x.fillRect(-42,86,84,18);
    x.fillStyle=GOLD_LT; x.font='10px Arial'; x.fillText('R E S E R V A',0,99);
    x.fillStyle=GOLD_DK; x.font='italic 18px Georgia'; x.fillText('Pinot Noir',0,128);
    x.restore();
  }

  if(kind==='front'){
    x.fillStyle=GOLD; x.fillRect(0,0,W,H);
    x.fillStyle='rgba(255,255,255,.07)'; x.fillRect(0,0,W,H);
    logo(W/2,150,0.92);
    x.fillStyle=CREAM; x.font='italic 13px Georgia'; x.textAlign='center';
    x.fillText('"A vinha próspera produz', W/2, 300);
    x.fillText('muito além de bons frutos,', W/2, 320);
    x.fillText('ela gera vida no', W/2, 340);
    x.fillText('compartilhar da mesa."', W/2, 360);
    // recorte da torneira
    x.strokeStyle='rgba(0,0,0,.4)'; x.setLineDash([6,5]); x.strokeRect(W/2-55,400,110,90);
    x.setLineDash([]);
  } else if(kind==='back'){
    x.fillStyle=CREAM; x.fillRect(0,0,W,H);
    logo(W/2,120,0.78);
    x.fillStyle=DARK; x.font='9px Arial'; x.textAlign='left'; x.globalAlpha=.75;
    const lines=['IMPORTADO POR: DINAMICA DO BRASIL','DISTRIBUÍDO POR: OUB WINES','ENGARRAFADO POR: CAP CASA AGRÍCOLA','Contém sulfitos · Não contém glúten','12% Vol · 3 litros','PRODUTO DE PORTUGAL'];
    lines.forEach((l,i)=>x.fillText(l,22,330+i*22)); x.globalAlpha=1;
  } else if(kind==='left'){
    x.fillStyle=CREAM; x.fillRect(0,0,W,H); pattern(GOLD);
    // moldura central clara com garrafa simbólica
    x.fillStyle=CREAM; x.fillRect(W/2-60,150,120,260);
    x.strokeStyle=GOLD; x.lineWidth=4; x.strokeRect(W/2-60,150,120,260);
    x.fillStyle='#15100a'; x.fillRect(W/2-22,180,44,180);
    x.fillStyle=GOLD; x.fillRect(W/2-22,170,44,16);
    logo(W/2,300,0.5);
  } else if(kind==='right'){
    x.fillStyle=CREAM; x.fillRect(0,0,W,H); pattern(GOLD);
    x.fillStyle=CREAM; x.fillRect(W/2-95,150,190,210);
    x.strokeStyle=GOLD; x.lineWidth=5; x.strokeRect(W/2-95,150,190,210);
    logo(W/2,235,0.82);
  } else { // top
    x.fillStyle=GOLD_DK; x.fillRect(0,0,W,H);
    x.fillStyle='rgba(0,0,0,.25)'; x.fillRect(W/2-70,H/2-12,140,24); // fenda da alça
    x.fillStyle=GOLD_LT; x.font='bold 22px Georgia'; x.textAlign='center';
    x.fillText('BC & BB', W/2, H/2-30);
  }
  const t=new THREE.CanvasTexture(c); t.anisotropy=8; return t;
}

let scene,camera,renderer,box,group,raf;
let exploded=false, autospin=true;
const faces={}, panels=[];

const mmW=1.00, mmD=1.85, mmH=2.15; // escala (1 unidade = 100mm)

function buildFace(geo, tex, pos, rot){
  const mat=new THREE.MeshStandardMaterial({map:tex, roughness:.45, metalness:.25, side:THREE.DoubleSide});
  const m=new THREE.Mesh(geo,mat); m.position.copy(pos);
  if(rot)m.rotation.set(rot.x||0,rot.y||0,rot.z||0);
  m.userData.home=pos.clone(); return m;
}

function init(){
  scene=new THREE.Scene(); scene.background=new THREE.Color('#1a110c');
  const ar=window.innerWidth/window.innerHeight;
  camera=new THREE.PerspectiveCamera(42, ar, 0.1, 100);
  camera.position.set(2.6,1.4,3.6);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  document.getElementById('app').appendChild(renderer.domElement);

  // luz quente de restaurante
  scene.add(new THREE.AmbientLight(0xffe6c0,0.55));
  const key=new THREE.DirectionalLight(0xffd9a0,1.1); key.position.set(3,5,4); scene.add(key);
  const fill=new THREE.DirectionalLight(0xffb060,0.4); fill.position.set(-4,2,-3); scene.add(fill);
  const rim=new THREE.PointLight(0xfff0d0,0.6,20); rim.position.set(0,3,-4); scene.add(rim);

  group=new THREE.Group(); scene.add(group);

  const planeW=new THREE.PlaneGeometry(mmW,mmH); // frente/verso
  const planeD=new THREE.PlaneGeometry(mmD,mmH); // laterais
  const planeT=new THREE.PlaneGeometry(mmW,mmD); // topo/base

  faces.front=buildFace(planeW, makeFaceTexture('front'), new THREE.Vector3(0,0,mmD/2));
  faces.back =buildFace(planeW, makeFaceTexture('back'),  new THREE.Vector3(0,0,-mmD/2), {y:Math.PI});
  faces.left =buildFace(planeD, makeFaceTexture('left'),  new THREE.Vector3(-mmW/2,0,0), {y:-Math.PI/2});
  faces.right=buildFace(planeD, makeFaceTexture('right'), new THREE.Vector3(mmW/2,0,0),  {y:Math.PI/2});
  faces.top  =buildFace(planeT, makeFaceTexture('top'),   new THREE.Vector3(0,mmH/2,0),  {x:-Math.PI/2});
  const botTex=makeFaceTexture('top');
  faces.bottom=buildFace(planeT, botTex, new THREE.Vector3(0,-mmH/2,0), {x:Math.PI/2});

  Object.values(faces).forEach(f=>{group.add(f); panels.push(f);});

  // ===== TORNEIRA estilo BICA de dispensador (não botão) =====
  const tapG=new THREE.Group();
  const matBlack=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:.4,metalness:.3});
  const matRed=new THREE.MeshStandardMaterial({color:0xcc3322,roughness:.35,metalness:.2});
  const flange=new THREE.Mesh(new THREE.CylinderGeometry(.13,.15,.07,24), matBlack);
  flange.rotation.x=Math.PI/2; flange.position.z=.03; tapG.add(flange);
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(.075,.085,.18,20), matBlack);
  neck.rotation.x=Math.PI/2; neck.position.z=.15; tapG.add(neck);
  const elbow=new THREE.Mesh(new THREE.SphereGeometry(.085,16,16), matBlack);
  elbow.position.z=.24; tapG.add(elbow);
  const spout=new THREE.Mesh(new THREE.CylinderGeometry(.055,.06,.22,18), matBlack);
  spout.position.set(0,-.12,.24); tapG.add(spout);
  const mouth=new THREE.Mesh(new THREE.CylinderGeometry(.062,.05,.04,18), matBlack);
  mouth.position.set(0,-.23,.24); tapG.add(mouth);
  const lever=new THREE.Mesh(new THREE.BoxGeometry(.07,.13,.05), matRed);
  lever.position.set(0,.12,.24); lever.rotation.x=.25; tapG.add(lever);
  const leverTip=new THREE.Mesh(new THREE.SphereGeometry(.04,12,12), matRed);
  leverTip.position.set(0,.18,.255); tapG.add(leverTip);
  tapG.position.set(0,-mmH/2+0.45, mmD/2+0.02); group.add(tapG); faces.tap=tapG; tapG.userData.home=tapG.position.clone();

  // ===== ALÇA achatada estilo papelão, fosca, no sentido da PROFUNDIDADE =====
  const matHandle=new THREE.MeshStandardMaterial({color:0xb89a62,roughness:.95,metalness:0.0});
  // curva de arco da alça no plano Y-Z (acompanha a profundidade D)
  const arcPts=[];
  const span=mmD*0.62, rise=0.34;
  for(let i=0;i<=24;i++){ const t=i/24; const z=(t-0.5)*span;
    const y=mmH/2 + Math.sin(t*Math.PI)*rise; arcPts.push(new THREE.Vector3(0,y,z)); }
  const arcCurve=new THREE.CatmullRomCurve3(arcPts);
  const handleGeo=new THREE.TubeGeometry(arcCurve,40,0.05,8,false);
  handleGeo.scale(2.0,1.0,1.0); // achata: mais largo no eixo X, fino na altura -> fita
  const handle=new THREE.Mesh(handleGeo, matHandle);
  group.add(handle); faces.handle=handle; handle.userData.home=new THREE.Vector3(0,0,0);
  // pontas/bases da alça encaixando no topo
  [-span/2,span/2].forEach(zz=>{ const base=new THREE.Mesh(new THREE.BoxGeometry(.14,.05,.10), matHandle);
    base.position.set(0,mmH/2,zz); group.add(base); });

  applyArtUrls();
  setupInteraction();
  document.getElementById('loader').style.display='none';
  animate();
}

function applyArtUrls(){
  const ld=new THREE.TextureLoader();
  for(const k in ART_URLS){ if(ART_URLS[k] && faces[k]){ ld.load(ART_URLS[k],t=>{t.anisotropy=8;faces[k].material.map=t;faces[k].material.needsUpdate=true;}); } }
}

  let down=false,lx=0,ly=0,rotX=0.15,rotY=0.5,dist=4.6,pinch=0;
  const el=renderer.domElement;
  const set=()=>{ group.rotation.y=rotY; group.rotation.x=rotX;
    camera.position.set(Math.sin(rotY)*0,0,0); camera.position.setLength(dist);
    camera.position.set(0,rotX*1.5,dist); camera.lookAt(0,0,0); };
  function start(x,y){down=true;lx=x;ly=y;autospin=false;document.getElementById('spinBtn').classList.remove('active');}
  function move(x,y){ if(!down)return; rotY+=(x-lx)*.01; rotX+=(y-ly)*.01;
    rotX=Math.max(-1.2,Math.min(1.2,rotX)); lx=x;ly=y; }
  function end(){down=false;}
  el.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',end);
  el.addEventListener('wheel',e=>{dist=Math.max(2.6,Math.min(8,dist+e.deltaY*.002));e.preventDefault();},{passive:false});
  el.addEventListener('touchstart',e=>{ if(e.touches.length===1)start(e.touches[0].clientX,e.touches[0].clientY);
    else if(e.touches.length===2){pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);} },{passive:true});
  el.addEventListener('touchmove',e=>{ if(e.touches.length===1)move(e.touches[0].clientX,e.touches[0].clientY);
    else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      dist=Math.max(2.6,Math.min(8,dist-(d-pinch)*.01)); pinch=d;} },{passive:true});
  el.addEventListener('touchend',end);
  window._rot=()=>({rotX,rotY,dist,set:(o)=>{rotX=o.rotX;rotY=o.rotY;dist=o.dist;}});
  window._apply=()=>{ group.rotation.y=rotY; group.rotation.x=0; camera.position.set(0,rotX*2.4,dist); camera.lookAt(0,0,0); };
}

function explode(on){
  exploded=on;
  const offs={front:[0,0,1.6],back:[0,0,-1.6],left:[-1.6,0,0],right:[1.6,0,0],top:[0,1.6,0],bottom:[0,-1.6,0]};
  panels.forEach(p=>{ const key=Object.keys(faces).find(k=>faces[k]===p);
    const o=offs[key]||[0,0,0]; const h=p.userData.home;
    p.userData.target = on ? new THREE.Vector3(h.x+o[0],h.y+o[1],h.z+o[2]) : h.clone(); });
}

function focusTap(){
  autospin=false; document.getElementById('spinBtn').classList.remove('active');
  const r=window._rot(); r.set({rotX:-0.5,rotY:0,dist:3.0});
}

function animate(){
  raf=requestAnimationFrame(animate);
  if(autospin) group.rotation.y+=0.005;
  const r=window._rot();
  if(!autospin){ group.rotation.y += (r.rotY - group.rotation.y)*0.15; }
  camera.position.lerp(new THREE.Vector3(0, r.rotX*2.4 + 0.3, r.dist), 0.12);
  camera.lookAt(0,0,0);
  panels.forEach(p=>{ if(p.userData.target) p.position.lerp(p.userData.target,0.12); });
  renderer.render(scene,camera);
}

/* botões */
document.getElementById('explodeBtn').onclick=function(){ explode(!exploded);
  this.classList.toggle('active',exploded); this.textContent=exploded?'⛶ Montar':'⛶ Desmontar'; };
document.getElementById('tapBtn').onclick=focusTap;
document.getElementById('resetBtn').onclick=()=>{ const r=window._rot(); r.set({rotX:0.15,rotY:0.5,dist:4.6});
  if(exploded){explode(false);document.getElementById('explodeBtn').classList.remove('active');document.getElementById('explodeBtn').textContent='⛶ Desmontar';} };
document.getElementById('spinBtn').onclick=function(){ autospin=!autospin; this.classList.toggle('active',autospin); };
document.getElementById('gearBtn').onclick=()=>document.getElementById('panel').classList.toggle('open');

document.querySelectorAll('.panel input[type=file]').forEach(inp=>{
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const fc=inp.dataset.face;
    const url=URL.createObjectURL(f); new THREE.TextureLoader().load(url,t=>{t.anisotropy=8;
      if(faces[fc]){faces[fc].material.map=t;faces[fc].material.needsUpdate=true;}}); };
});

window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });

init();
</script>
</body>
</html>
